<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Best Practices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink: #0e0e0e;
  --paper: #f5f2ed;
  --paper-warm: #ede9e2;
  --rule: rgba(14,14,14,0.12);
  --rule-strong: rgba(14,14,14,0.25);
  --accent: #1a1a2e;
  --cat-prompting: #2d4a3e;
  --cat-architecture: #1a2a4a;
  --cat-evaluation: #3d2a1a;
  --cat-governance: #2a1a3d;
  --cat-default: #1a1a2e;
  --mono: 'Fira Code', monospace;
  --display: 'Syne', sans-serif;
  --body: 'Spectral', serif;
  --max: 1320px;
  --col: calc((var(--max) - 4rem) / 12);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--body);
  background: var(--paper);
  color: var(--ink);
  font-size: 18px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.site-header {
  border-bottom: 2px solid var(--ink);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 100;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 60px;
}

.site-logo {
  font-family: var(--display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-decoration: none;
  cursor: pointer;
}

.site-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  cursor: pointer;
}

.site-meta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(14,14,14,0.4);
  text-align: right;
  text-transform: uppercase;
}

/* ─── FILTER BAR ─── */
.filter-bar {
  border-bottom: 1px solid var(--rule);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--paper);
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 12px 18px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: rgba(14,14,14,0.4);
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--ink); }
.filter-btn.active {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

/* ─── SEARCH ─── */
.search-wrap {
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.35);
  white-space: nowrap;
}
.search-input {
  font-family: var(--mono);
  font-size: 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule-strong);
  padding: 4px 0;
  width: 280px;
  outline: none;
  color: var(--ink);
  transition: border-color 0.15s;
}
.search-input:focus { border-bottom-color: var(--ink); }
.search-input::placeholder { color: rgba(14,14,14,0.25); }

/* ─── TICKER ─── */
.ticker-wrap {
  background: var(--ink);
  color: var(--paper);
  overflow: hidden;
  height: 34px;
  display: flex;
  align-items: center;
}
.ticker-inner {
  display: flex;
  align-items: center;
  gap: 0;
  animation: ticker 40s linear infinite;
  white-space: nowrap;
}
.ticker-item {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 0 3rem;
  border-right: 1px solid rgba(245,242,237,0.15);
}
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ─── MAIN LAYOUT ─── */
main {
  max-width: var(--max);
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

/* ─── FEATURED ─── */
.featured-article {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border: 1px solid var(--rule-strong);
  margin-bottom: 3rem;
  cursor: pointer;
  transition: background 0.15s;
}
.featured-article:hover { background: var(--paper-warm); }

.featured-visual {
  background: var(--accent);
  min-height: 380px;
  display: flex;
  align-items: flex-end;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
.featured-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,242,237,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,242,237,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
.featured-cat-label {
  position: relative;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(245,242,237,0.5);
  padding: 5px 10px;
  border: 1px solid rgba(245,242,237,0.2);
}
.featured-body {
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.featured-kicker {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.4);
  margin-bottom: 1rem;
}
.featured-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 1.25rem;
  color: var(--ink);
}
.featured-tagline {
  font-family: var(--body);
  font-size: 16px;
  font-style: italic;
  color: rgba(14,14,14,0.6);
  line-height: 1.6;
  margin-bottom: auto;
}
.featured-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 1.5rem;
  margin-top: 1.5rem;
  border-top: 1px solid var(--rule);
}
.article-date {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(14,14,14,0.35);
  text-transform: uppercase;
}
.read-cta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
}

/* ─── GRID ─── */
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.35);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.articles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}

.article-card {
  background: var(--paper);
  padding: 1.75rem;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  animation: fadeIn 0.4s ease both;
}
.article-card:hover { background: var(--paper-warm); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-cat {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 8px;
  display: inline-block;
  align-self: flex-start;
}

.card-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 19px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.card-tagline {
  font-family: var(--body);
  font-size: 14px;
  font-style: italic;
  color: rgba(14,14,14,0.55);
  line-height: 1.55;
  flex: 1;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 0.75rem;
  border-top: 1px solid var(--rule);
  margin-top: auto;
}

.tag-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.35);
  padding: 2px 6px;
  border: 1px solid var(--rule);
}

/* ─── ARTICLE DETAIL ─── */
.detail-view {
  display: none;
  max-width: 820px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
  animation: fadeIn 0.35s ease both;
}
.detail-view.visible { display: block; }

.detail-back {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  color: rgba(14,14,14,0.4);
  cursor: pointer;
  padding: 0;
  margin-bottom: 3rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.15s;
}
.detail-back:hover { color: var(--ink); }

.detail-cat {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  display: inline-block;
  margin-bottom: 1.5rem;
}

.detail-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1.08;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 1.5rem;
}

.detail-tagline {
  font-family: var(--body);
  font-size: 20px;
  font-style: italic;
  color: rgba(14,14,14,0.6);
  line-height: 1.55;
  border-left: 3px solid var(--ink);
  padding-left: 1.25rem;
  margin-bottom: 2rem;
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 2.5rem;
}

.detail-divider {
  height: 2px;
  background: var(--ink);
  margin: 3rem 0;
}

.detail-content {
  font-family: var(--body);
  font-size: 19px;
  line-height: 1.8;
  color: rgba(14,14,14,0.85);
}
.detail-content p { margin-bottom: 1.5rem; }
.detail-content strong { color: var(--ink); font-weight: 600; }

.detail-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 2rem;
  margin-top: 2rem;
  border-top: 1px solid var(--rule);
}

/* ─── CATEGORY COLORS ─── */
.cat-prompting { background: rgba(45,74,62,0.1); color: var(--cat-prompting); }
.cat-architecture { background: rgba(26,42,74,0.1); color: var(--cat-architecture); }
.cat-evaluation { background: rgba(61,42,26,0.1); color: var(--cat-evaluation); }
.cat-governance { background: rgba(42,26,61,0.1); color: var(--cat-governance); }
.cat-default { background: rgba(26,26,46,0.1); color: var(--cat-default); }

.visual-prompting { background: var(--cat-prompting); }
.visual-architecture { background: var(--cat-architecture); }
.visual-evaluation { background: var(--cat-evaluation); }
.visual-governance { background: var(--cat-governance); }
.visual-default { background: var(--cat-default); }

/* ─── EMPTY / LOADING ─── */
.state-msg {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(14,14,14,0.25);
  text-transform: uppercase;
  padding: 4rem 0;
  text-align: center;
  grid-column: 1 / -1;
}

/* ─── FOOTER ─── */
.site-footer {
  border-top: 2px solid var(--ink);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--paper);
}
.footer-logo {
  font-family: var(--display);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: -0.01em;
}
.footer-note {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.35);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 960px) {
  .featured-article { grid-template-columns: 1fr; }
  .featured-visual { min-height: 200px; }
  .articles-grid { grid-template-columns: 1fr 1fr; }
  .site-header { grid-template-columns: 1fr 1fr; }
  .site-title { display: none; }
  .site-meta { text-align: right; }
}
@media (max-width: 600px) {
  .articles-grid { grid-template-columns: 1fr; }
  .site-header { grid-template-columns: 1fr auto; }
  .featured-title { font-size: 24px; }
  .search-input { width: 100%; }
}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<!-- HEADER -->
<header class="site-header">
  <span class="site-logo" onclick="showList()">AI Best Practices</span>
  <span class="site-title" onclick="showList()">AI&nbsp;Best&nbsp;Practices</span>
  <span class="site-meta" id="article-count">Loading...</span>
</header>

<!-- FILTER + SEARCH -->
<div id="controls-wrap">
  <nav class="filter-bar" id="filter-bar"></nav>
  <div class="search-wrap">
    <span class="search-label">Search</span>
    <input class="search-input" id="search-input" type="text" placeholder="title, category, tag..." autocomplete="off">
  </div>
</div>

<!-- LIST VIEW -->
<div id="list-view">
  <main>
    <div id="featured-slot"></div>
    <p class="section-label" id="grid-label">All Articles</p>
    <div class="articles-grid" id="articles-grid"></div>
  </main>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detail-view">
  <div style="max-width:820px;margin:0 auto;padding:3rem 2rem 6rem;">
    <button class="detail-back" onclick="showList()">← All articles</button>
    <div id="detail-content-inner"></div>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-logo">AI Best Practices</span>
  <span class="footer-note" id="footer-date"></span>
</footer>

<script>
let ALL_ARTICLES = [];
let activeFilter = 'All';
let searchQuery = '';

const catClass = cat => {
  const map = { Prompting:'prompting', Architecture:'architecture', Evaluation:'evaluation', Governance:'governance' };
  return map[cat] || 'default';
};

const formatDate = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
};

const timeAgo = iso => {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return formatDate(iso);
};

function buildTicker(articles) {
  const inner = document.getElementById('ticker-inner');
  const items = [...articles, ...articles].map(a =>
    `<span class="ticker-item">${a.category.toUpperCase()} — ${a.title}</span>`
  ).join('');
  inner.innerHTML = items;
}

function buildFilters(articles) {
  const cats = ['All', ...new Set(articles.map(a => a.category))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = cats.map(c =>
    `<button class="filter-btn${c === activeFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  renderList();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return ALL_ARTICLES.filter(a => {
    const matchCat = activeFilter === 'All' || a.category === activeFilter;
    const matchQ = !q || a.title.toLowerCase().includes(q)
      || a.category.toLowerCase().includes(q)
      || (a.tags || []).some(t => t.toLowerCase().includes(q))
      || a.tagline.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderList() {
  const filtered = getFiltered();
  const featured = filtered.find(a => a.featured) || filtered[0];
  const rest = filtered.filter(a => a !== featured);

  // Featured
  const fs = document.getElementById('featured-slot');
  if (featured) {
    const cc = catClass(featured.category);
    fs.innerHTML = `
      <div class="featured-article" onclick="showDetail('${featured.id}')">
        <div class="featured-visual visual-${cc}">
          <div class="featured-grid-bg"></div>
          <span class="featured-cat-label">${featured.category}</span>
        </div>
        <div class="featured-body">
          <div>
            <p class="featured-kicker">Featured — ${timeAgo(featured.publishedAt)}</p>
            <h2 class="featured-title">${featured.title}</h2>
            <p class="featured-tagline">${featured.tagline}</p>
          </div>
          <div class="featured-footer">
            <span class="article-date">${formatDate(featured.publishedAt)}</span>
            <span class="read-cta">Read →</span>
          </div>
        </div>
      </div>`;
    fs.style.display = filtered.length > 0 ? 'block' : 'none';
  } else {
    fs.innerHTML = '';
  }

  // Grid
  const grid = document.getElementById('articles-grid');
  const label = document.getElementById('grid-label');
  if (rest.length === 0 && !featured) {
    label.style.display = 'none';
    grid.innerHTML = `<p class="state-msg">No articles found</p>`;
  } else {
    label.style.display = 'flex';
    label.textContent = activeFilter === 'All' ? 'All Articles' : activeFilter;
    grid.innerHTML = rest.map((a, i) => {
      const cc = catClass(a.category);
      return `
        <div class="article-card" onclick="showDetail('${a.id}')" style="animation-delay:${i*0.06}s">
          <span class="card-cat cat-${cc}">${a.category}</span>
          <h3 class="card-title">${a.title}</h3>
          <p class="card-tagline">${a.tagline}</p>
          <div class="card-footer">
            <span class="article-date">${timeAgo(a.publishedAt)}</span>
            <div class="tag-list">
              ${(a.tags||[]).slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>`;
    }).join('') || `<p class="state-msg">No other articles</p>`;
  }

  document.getElementById('article-count').textContent = `${filtered.length} article${filtered.length!==1?'s':''}`;
}

function showDetail(id) {
  const a = ALL_ARTICLES.find(x => x.id === id);
  if (!a) return;
  const cc = catClass(a.category);
  const paragraphs = a.content.split('\n').filter(p => p.trim()).map(p => {
    const html = p.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return `<p>${html}</p>`;
  }).join('');

  document.getElementById('detail-content-inner').innerHTML = `
    <span class="detail-cat cat-${cc}">${a.category}</span>
    <h1 class="detail-title">${a.title}</h1>
    <p class="detail-tagline">${a.tagline}</p>
    <div class="detail-meta">
      <span class="article-date">${formatDate(a.publishedAt)}</span>
      <span class="article-date">${timeAgo(a.publishedAt)}</span>
    </div>
    <div class="detail-content">${paragraphs}</div>
    <div class="detail-tags">
      ${(a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>`;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('controls-wrap').style.display = 'none';
  document.getElementById('detail-view').classList.add('visible');
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('controls-wrap').style.display = 'block';
  document.getElementById('detail-view').classList.remove('visible');
  window.scrollTo(0, 0);
}

async function init() {
  try {
    const res = await fetch('articles.json');
    if (!res.ok) throw new Error('fetch failed');
    ALL_ARTICLES = await res.json();
    ALL_ARTICLES.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  } catch(e) {
    document.getElementById('articles-grid').innerHTML = `<p class="state-msg">Could not load articles.json</p>`;
    document.getElementById('article-count').textContent = 'Error';
    return;
  }
  buildTicker(ALL_ARTICLES);
  buildFilters(ALL_ARTICLES);
  renderList();
  document.getElementById('footer-date').textContent =
    `Updated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderList();
  });
}

init();
</script>
</body>
</html>
