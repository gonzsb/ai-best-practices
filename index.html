<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Best Practices</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink: #0e0e0e;
  --paper: #f5f2ed;
  --paper-warm: #ede9e2;
  --rule: rgba(14,14,14,0.1);
  --rule-strong: rgba(14,14,14,0.22);
  --cat-tips: #1a3a2a;
  --cat-prompting: #1a1a3a;
  --cat-creative: #3a1a2a;
  --cat-default: #1a1a1a;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --max: 1320px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── TICKER ─── */
.ticker-wrap {
  background: var(--ink);
  color: var(--paper);
  overflow: hidden;
  height: 32px;
  display: flex;
  align-items: center;
}
.ticker-inner {
  display: flex;
  align-items: center;
  animation: ticker 50s linear infinite;
  white-space: nowrap;
}
.ticker-item {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0 3rem;
  border-right: 1px solid rgba(245,242,237,0.12);
}
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ─── HEADER ─── */
.site-header {
  border-bottom: 2px solid var(--ink);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 100;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 58px;
}
.site-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
  cursor: pointer;
  text-transform: uppercase;
}
.site-title {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  cursor: pointer;
}
.site-meta {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(14,14,14,0.35);
  text-align: right;
  text-transform: uppercase;
}

/* ─── FILTER BAR ─── */
.filter-bar {
  border-bottom: 1px solid var(--rule);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--paper);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 12px 16px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: rgba(14,14,14,0.35);
  cursor: pointer;
  transition: color 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--ink); }
.filter-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

/* ─── SEARCH ─── */
.search-wrap {
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.3);
  white-space: nowrap;
}
.search-input {
  font-family: var(--font);
  font-size: 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule-strong);
  padding: 4px 0;
  width: 280px;
  outline: none;
  color: var(--ink);
  transition: border-color 0.15s;
}
.search-input:focus { border-bottom-color: var(--ink); }
.search-input::placeholder { color: rgba(14,14,14,0.2); }

/* ─── MAIN ─── */
main {
  max-width: var(--max);
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

/* ─── FEATURED ─── */
.featured-article {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--rule-strong);
  margin-bottom: 3rem;
  cursor: pointer;
  transition: background 0.15s;
}
.featured-article:hover { background: var(--paper-warm); }

.featured-visual {
  min-height: 360px;
  display: flex;
  align-items: flex-end;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
.featured-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,242,237,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,242,237,0.04) 1px, transparent 1px);
  background-size: 36px 36px;
}
.featured-cat-label {
  position: relative;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,242,237,0.5);
  padding: 5px 10px;
  border: 1px solid rgba(245,242,237,0.18);
}
.featured-body {
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.featured-kicker {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.35);
  margin-bottom: 1rem;
}
.featured-title {
  font-size: 30px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 1.25rem;
  color: var(--ink);
}
.featured-tagline {
  font-size: 15px;
  font-weight: 300;
  color: rgba(14,14,14,0.55);
  line-height: 1.65;
  margin-bottom: auto;
}
.featured-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 1.5rem;
  margin-top: 1.5rem;
  border-top: 1px solid var(--rule);
}
.article-date {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  color: rgba(14,14,14,0.3);
  text-transform: uppercase;
}
.read-cta {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
}

/* ─── GRID ─── */
.section-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.3);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.articles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}

.article-card {
  background: var(--paper);
  padding: 1.75rem;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  animation: fadeIn 0.4s ease both;
}
.article-card:hover { background: var(--paper-warm); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-cat {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 8px;
  display: inline-block;
  align-self: flex-start;
}
.card-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.card-tagline {
  font-size: 13px;
  font-weight: 300;
  color: rgba(14,14,14,0.5);
  line-height: 1.6;
  flex: 1;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 0.75rem;
  border-top: 1px solid var(--rule);
  margin-top: auto;
}
.tag-list { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.3);
  padding: 2px 6px;
  border: 1px solid var(--rule);
}

/* ─── DETAIL ─── */
.detail-view {
  display: none;
  max-width: 760px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
  animation: fadeIn 0.3s ease both;
}
.detail-view.visible { display: block; }

.detail-back {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  color: rgba(14,14,14,0.35);
  cursor: pointer;
  padding: 0;
  margin-bottom: 3rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.15s;
  font-family: var(--font);
}
.detail-back:hover { color: var(--ink); }

.detail-cat {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  display: inline-block;
  margin-bottom: 1.5rem;
}
.detail-title {
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 1.25rem;
}
.detail-tagline {
  font-size: 17px;
  font-weight: 300;
  color: rgba(14,14,14,0.55);
  line-height: 1.6;
  border-left: 3px solid var(--ink);
  padding-left: 1.25rem;
  margin-bottom: 2rem;
}
.detail-meta {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 2.5rem;
}
.detail-content {
  font-size: 17px;
  font-weight: 300;
  line-height: 1.85;
  color: rgba(14,14,14,0.8);
}
.detail-content p { margin-bottom: 1.4rem; }
.detail-content strong { color: var(--ink); font-weight: 600; }
.detail-content code {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  background: rgba(14,14,14,0.05);
  padding: 2px 6px;
  border-radius: 2px;
  color: var(--ink);
}
.detail-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 2rem;
  margin-top: 2rem;
  border-top: 1px solid var(--rule);
}

/* ─── CATEGORY COLORS ─── */
.cat-tips-tricks { background: rgba(26,58,42,0.08); color: var(--cat-tips); }
.cat-prompting { background: rgba(26,26,58,0.08); color: var(--cat-prompting); }
.cat-creative-ai { background: rgba(58,26,42,0.08); color: var(--cat-creative); }
.cat-default { background: rgba(26,26,26,0.06); color: var(--cat-default); }

.visual-tips-tricks { background: #1a3a2a; }
.visual-prompting { background: #1a1a3a; }
.visual-creative-ai { background: #3a1a2a; }
.visual-default { background: #1a1a1a; }

/* ─── STATES ─── */
.state-msg {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: rgba(14,14,14,0.2);
  text-transform: uppercase;
  padding: 4rem 0;
  text-align: center;
  grid-column: 1 / -1;
}

/* ─── FOOTER ─── */
.site-footer {
  border-top: 2px solid var(--ink);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--paper);
}
.footer-logo {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.footer-note {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(14,14,14,0.3);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 960px) {
  .featured-article { grid-template-columns: 1fr; }
  .featured-visual { min-height: 180px; }
  .articles-grid { grid-template-columns: 1fr 1fr; }
  .site-title { display: none; }
}
@media (max-width: 600px) {
  .articles-grid { grid-template-columns: 1fr; }
  .site-header { grid-template-columns: 1fr auto; }
  .featured-title { font-size: 22px; }
  .search-input { width: 100%; }
}
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker-inner"></div></div>

<header class="site-header">
  <span class="site-logo" onclick="showList()">AI Best Practices</span>
  <span class="site-title" onclick="showList()">AI&nbsp;Best&nbsp;Practices</span>
  <span class="site-meta" id="article-count">—</span>
</header>

<div id="controls-wrap">
  <nav class="filter-bar" id="filter-bar"></nav>
  <div class="search-wrap">
    <span class="search-label">Search</span>
    <input class="search-input" id="search-input" type="text" placeholder="title, category, tag..." autocomplete="off">
  </div>
</div>

<div id="list-view">
  <main>
    <div id="featured-slot"></div>
    <p class="section-label" id="grid-label">All Articles</p>
    <div class="articles-grid" id="articles-grid"></div>
  </main>
</div>

<div class="detail-view" id="detail-view">
  <div style="max-width:760px;margin:0 auto;padding:3rem 2rem 6rem;">
    <button class="detail-back" onclick="showList()">← All articles</button>
    <div id="detail-content-inner"></div>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-logo">AI Best Practices</span>
  <span class="footer-note" id="footer-date"></span>
</footer>

<script>
let ALL = [];
let activeFilter = 'All';
let searchQ = '';

const catSlug = cat => cat.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g,'-').replace(/^-|-$/g,'');

const catColorClass = cat => {
  const s = catSlug(cat);
  const map = { 'tips-tricks':'tips-tricks', 'prompting':'prompting', 'creative-ai':'creative-ai' };
  return map[s] || 'default';
};

const fmtDate = iso => new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

const timeAgo = iso => {
  const d = Math.floor((Date.now()-new Date(iso))/1000);
  if(d<3600) return `${Math.floor(d/60)}m ago`;
  if(d<86400) return `${Math.floor(d/3600)}h ago`;
  if(d<604800) return `${Math.floor(d/86400)}d ago`;
  return fmtDate(iso);
};

function buildTicker(arr) {
  const el = document.getElementById('ticker-inner');
  el.innerHTML = [...arr,...arr].map(a=>`<span class="ticker-item">${a.category.toUpperCase()} — ${a.title}</span>`).join('');
}

function buildFilters(arr) {
  const cats = ['All',...new Set(arr.map(a=>a.category))];
  document.getElementById('filter-bar').innerHTML = cats.map(c=>
    `<button class="filter-btn${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  renderList();
}

function getFiltered() {
  const q = searchQ.toLowerCase();
  return ALL.filter(a=>{
    const mc = activeFilter==='All'||a.category===activeFilter;
    const mq = !q||a.title.toLowerCase().includes(q)||a.category.toLowerCase().includes(q)||(a.tags||[]).some(t=>t.toLowerCase().includes(q))||a.tagline.toLowerCase().includes(q);
    return mc && mq;
  });
}

function renderList() {
  const f = getFiltered();
  const feat = f.find(a=>a.featured)||f[0];
  const rest = f.filter(a=>a!==feat);
  const fs = document.getElementById('featured-slot');

  if(feat) {
    const cc = catColorClass(feat.category);
    fs.innerHTML = `<div class="featured-article" onclick="showDetail('${feat.id}')">
      <div class="featured-visual visual-${cc}">
        <div class="featured-grid-bg"></div>
        <span class="featured-cat-label">${feat.category}</span>
      </div>
      <div class="featured-body">
        <div>
          <p class="featured-kicker">Featured — ${timeAgo(feat.publishedAt)}</p>
          <h2 class="featured-title">${feat.title}</h2>
          <p class="featured-tagline">${feat.tagline}</p>
        </div>
        <div class="featured-footer">
          <span class="article-date">${fmtDate(feat.publishedAt)}</span>
          <span class="read-cta">Read →</span>
        </div>
      </div>
    </div>`;
    fs.style.display='block';
  } else { fs.innerHTML=''; fs.style.display='none'; }

  const grid = document.getElementById('articles-grid');
  const label = document.getElementById('grid-label');
  if(!rest.length && !feat) {
    label.style.display='none';
    grid.innerHTML='<p class="state-msg">No articles found</p>';
  } else {
    label.style.display='flex';
    label.textContent = activeFilter==='All'?'All Articles':activeFilter;
    grid.innerHTML = rest.map((a,i)=>{
      const cc = catColorClass(a.category);
      return `<div class="article-card" onclick="showDetail('${a.id}')" style="animation-delay:${i*0.06}s">
        <span class="card-cat cat-${cc}">${a.category}</span>
        <h3 class="card-title">${a.title}</h3>
        <p class="card-tagline">${a.tagline}</p>
        <div class="card-footer">
          <span class="article-date">${timeAgo(a.publishedAt)}</span>
          <div class="tag-list">${(a.tags||[]).slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
    }).join('')||'<p class="state-msg">No other articles</p>';
  }
  document.getElementById('article-count').textContent = `${f.length} article${f.length!==1?'s':''}`;
}

function showDetail(id) {
  const a = ALL.find(x=>x.id===id);
  if(!a) return;
  const cc = catColorClass(a.category);
  const body = a.content.split('\n').filter(p=>p.trim()).map(p=>{
    const html = p
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`]+)`/g,'<code>$1</code>');
    return `<p>${html}</p>`;
  }).join('');
  document.getElementById('detail-content-inner').innerHTML = `
    <span class="detail-cat cat-${cc}">${a.category}</span>
    <h1 class="detail-title">${a.title}</h1>
    <p class="detail-tagline">${a.tagline}</p>
    <div class="detail-meta">
      <span class="article-date">${fmtDate(a.publishedAt)}</span>
      <span class="article-date">${timeAgo(a.publishedAt)}</span>
    </div>
    <div class="detail-content">${body}</div>
    <div class="detail-tags">${(a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  document.getElementById('list-view').style.display='none';
  document.getElementById('controls-wrap').style.display='none';
  document.getElementById('detail-view').classList.add('visible');
  window.scrollTo(0,0);
}

function showList() {
  document.getElementById('list-view').style.display='block';
  document.getElementById('controls-wrap').style.display='block';
  document.getElementById('detail-view').classList.remove('visible');
  window.scrollTo(0,0);
}

async function init() {
  try {
    const res = await fetch('articles.json');
    if(!res.ok) throw new Error();
    ALL = await res.json();
    ALL.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  } catch {
    document.getElementById('articles-grid').innerHTML='<p class="state-msg">Could not load articles.json</p>';
    document.getElementById('article-count').textContent='Error';
    return;
  }
  buildTicker(ALL);
  buildFilters(ALL);
  renderList();
  document.getElementById('footer-date').textContent = `Updated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
  document.getElementById('search-input').addEventListener('input',e=>{searchQ=e.target.value;renderList();});
}

init();
</script>
</body>
</html>
